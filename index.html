<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amanthos Onboarding</title>
<style>
:root{--dark:#232d36;--dark2:#2b3540;--red:#c94f4f;--red-deep:#b03a3a;--paper:#f7f6f3;--ink:#1c242b;--muted:#6b7681;--line:#e3e0da}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
header{background:var(--dark);color:#fff;border-bottom:5px solid var(--red);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.mark{font-weight:800;letter-spacing:4px;font-size:20px}
.langs{display:flex;gap:6px}
.langs button{background:#3a4650;color:#fff;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px}
.langs button.on{background:var(--red)}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}
.progress{display:flex;gap:8px;margin-bottom:28px}
.progress div{flex:1;height:6px;border-radius:3px;background:#ddd9d2;transition:.3s}
.progress div.done{background:var(--red)}
h1{font-size:32px;font-weight:800;line-height:1.2;margin-bottom:10px}
h1 em{font-style:normal;color:var(--red-deep)}
p.lead{color:var(--muted);font-size:17px;margin-bottom:24px;line-height:1.6}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:20px 0}
.vcard{background:#fff;border:1.5px solid var(--line);border-top:4px solid var(--red);border-radius:12px;padding:20px;cursor:pointer;transition:.2s}
.vcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.vcard h3{font-size:16px;margin-bottom:6px}
.vcard p{font-size:14px;color:var(--muted);line-height:1.55;display:none}
.vcard.open p{display:block}
.vcard .more{font-size:12px;color:var(--red-deep);font-weight:700;margin-top:6px}
.vcard.open .more{display:none}
.hint{font-size:13px;color:var(--muted);margin:6px 0 18px}
.selgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:14px 0 26px}
.sel{background:#fff;border:2px solid var(--line);border-radius:12px;padding:20px;cursor:pointer;transition:.15s;text-align:center}
.sel:hover{border-color:#b9c2ca}
.sel.on{border-color:var(--red);background:#fdf4f4;box-shadow:0 0 0 3px rgba(201,79,79,.15)}
.sel h3{font-size:16px;margin-bottom:4px}
.sel p{font-size:13px;color:var(--muted)}
.sel .ico{font-size:28px;margin-bottom:8px}
h2{font-size:22px;font-weight:800;margin:26px 0 12px}
.btn{display:inline-block;background:var(--red-deep);color:#fff;border:none;padding:15px 34px;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;transition:.15s;text-decoration:none}
.btn:hover{background:#9c3030}
.btn:disabled{background:#cfc9c0;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--muted);font-weight:600;padding:15px 18px}
.nav{display:flex;justify-content:space-between;margin-top:30px;align-items:center}
.sopbox{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:24px;margin:14px 0}
.times{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:14px 0}
.time{background:var(--dark);color:#fff;border-radius:10px;padding:16px;text-align:center}
.time.red{background:var(--red-deep)}
.time b{font-size:26px;display:block}
.time span{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#c5cdd4}
ul.rules{margin:10px 0 6px 20px;line-height:1.9;font-size:15px}
.videobox{background:#eef3fb;border:1.5px solid #b9cdec;border-radius:12px;padding:22px;margin:16px 0}
.videobox h3{margin-bottom:8px}
.videobox p{font-size:14.5px;color:#3a4a60;margin-bottom:14px;line-height:1.6}
.pdfs a{display:inline-block;margin:4px 8px 4px 0;font-size:13.5px;color:var(--red-deep);font-weight:700;text-decoration:none;border:1.5px solid var(--red);border-radius:8px;padding:7px 12px}
.expect{background:var(--dark);color:#fff;border-radius:14px;padding:26px;margin:18px 0}
.expect h3{color:var(--red);letter-spacing:2px;text-transform:uppercase;font-size:13px;margin-bottom:10px}
.expect p{color:#c5cdd4;line-height:1.7;font-size:15.5px}
input[type=text]{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;margin:8px 0 14px}
label.chk{display:flex;gap:10px;align-items:flex-start;font-size:15px;line-height:1.5;cursor:pointer;margin:10px 0}
label.chk input{width:20px;height:20px;margin-top:2px;flex-shrink:0}
.donebox{text-align:center;padding:40px 20px}
.donebox .big{font-size:56px;margin-bottom:12px}
.step{display:none}.step.on{display:block;animation:fade .35s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.summary{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:18px;margin:16px auto;max-width:420px;text-align:left;font-size:15px;line-height:2}
</style>
</head>
<body>
<header><div class="mark">AMANTHOS</div><div class="langs">
<button id="l-de" onclick="setLang('de')">DE</button>
<button id="l-en" onclick="setLang('en')">EN</button>
<button id="l-pl" onclick="setLang('pl')">PL</button>
</div></header>
<div class="wrap">
<div class="progress"><div id="p1"></div><div id="p2"></div><div id="p3"></div><div id="p4"></div></div>

<!-- STEP 0: Sprache -->
<div class="step on" id="s0">
  <h1 style="text-align:center;margin-top:30px">🌍</h1>
  <h1 style="text-align:center">Sprache wählen<br><span style="font-size:20px;color:#6b7681;font-weight:600">Choose your language · Wybierz język</span></h1>
  <div class="selgrid" style="max-width:640px;margin:34px auto">
    <div class="sel" onclick="chooseLang('de')"><div class="ico">🇩🇪</div><h3>Deutsch</h3><p>Weiter auf Deutsch</p></div>
    <div class="sel" onclick="chooseLang('en')"><div class="ico">🇬🇧</div><h3>English</h3><p>Continue in English</p></div>
    <div class="sel" onclick="chooseLang('pl')"><div class="ico">🇵🇱</div><h3>Polski</h3><p>Kontynuuj po polsku</p></div>
  </div>
</div>

<!-- STEP 1: Unternehmen -->
<div class="step" id="s1">
  <h1 data-i="welcomeTitle"></h1>
  <p class="lead" data-i="welcomeLead"></p>
  <div class="cards" id="valuecards"></div>
  <p class="hint" data-i="cardsHint"></p>
  <div class="nav"><span></span><button class="btn" id="next1" onclick="go(2)" data-i="next"></button></div>
</div>

<!-- STEP 2: Standort & Position -->
<div class="step" id="s2">
  <h1 data-i="chooseTitle"></h1>
  <h2 data-i="chooseLocation"></h2>
  <div class="selgrid" id="locgrid"></div>
  <h2 data-i="choosePosition"></h2>
  <div class="selgrid" id="posgrid"></div>
  <div class="nav"><button class="btn ghost" onclick="go(1)" data-i="back"></button><button class="btn" id="next2" disabled onclick="renderSop();go(3)" data-i="next"></button></div>
</div>

<!-- STEP 3: SOP -->
<div class="step" id="s3">
  <h1 data-i="sopTitle"></h1>
  <p class="lead" id="sopIntro"></p>
  <div id="sopContent"></div>
  <div class="nav"><button class="btn ghost" onclick="go(2)" data-i="back"></button><button class="btn" onclick="go(4)" data-i="sopRead"></button></div>
</div>

<!-- STEP 4: Commitment -->
<div class="step" id="s4">
  <h1 data-i="commitTitle"></h1>
  <div class="expect"><h3 data-i="expectKicker"></h3><p data-i="expectText"></p></div>
  <div class="sopbox">
    <label style="font-weight:700;font-size:14px" data-i="yourName"></label>
    <input type="text" id="name" oninput="checkCommit()" placeholder="">
    <label class="chk"><input type="checkbox" id="agree1" onchange="checkCommit()"><span data-i="agreeSop"></span></label>
    <label class="chk"><input type="checkbox" id="agree2" onchange="checkCommit()"><span data-i="agreeExpect"></span></label>
  </div>
  <div class="nav"><button class="btn ghost" onclick="go(3)" data-i="back"></button><button class="btn" id="commitBtn" disabled onclick="finish()" data-i="commitBtn"></button></div>
</div>

<!-- STEP 5: Fertig -->
<div class="step" id="s5">
  <div class="donebox">
    <div class="big">🎉</div>
    <h1 data-i="doneTitle"></h1>
    <p class="lead" data-i="doneLead"></p>
    <div class="summary" id="summary"></div>
    <a class="btn" id="mailBtn" href="#" data-i="doneMail"></a>
  </div>
</div>
</div>

 commitTitle:"Twoje zobowiązanie.",
 expectKicker:"Nasze oczekiwania",
 expectText:"Powiedzmy szczerze: nasze oczekiwania są wysokie. Oczekujemy punktualności, staranności, odpowiedzialności i zaangażowania – każdego dnia. W zamian dostajesz zespół, który Cię wspiera, bezpośredni kontakt z przełożonymi i szansę rozwoju. W Amanthos jakość to nie wyjątek – to standard.",
 yourName:"Twoje imię i nazwisko",
 agreeSop:"Przeczytałem/-am i zrozumiałem/-am SOP dla mojej lokalizacji i stanowiska. Będę ich przestrzegać.",
 agreeExpect:"Wiem, że oczekiwania są wysokie – jakość, punktualność i normy czasowe są wiążące i będą kontrolowane.",
 commitBtn:"Zgadzam się ✓",
 doneTitle:"Witamy w zespole!",
 doneLead:"Twój onboarding jest zakończony. Wyślij nam teraz potwierdzenie – potem czeka Cię wprowadzenie na miejscu.",
 doneMail:"Wyślij potwierdzenie e-mailem",
 mailSubj:"Potwierdzenie onboardingu",
 mailBody:(n,l,p)=>`Dzień dobry\n\nUkończyłem/-am onboarding Amanthos i potwierdzam SOP.\n\nImię i nazwisko: ${n}\nLokalizacja: ${l}\nStanowisko: ${p}\nData: ${new Date().toLocaleDateString("pl-PL")}\n\nPozdrawiam\n${n}`,
 sumName:"Imię i nazwisko", sumLoc:"Lokalizacja", sumPos:"Stanowisko", sumDate:"Data"},
};
const LOCS = ["prize","mulin","living"];
const SOPTIMES = {
 prize: [["25","dep0",""],["15","res","red"]],
 mulin: [["30","dep1",""],["40","dep2",""],["15","dep3",""],["15","res","red"]],
 living: null };
const TIMELBL = {
 de: {dep0:"Departure-Zimmer", dep1:"Departure Doppelzimmer", dep2:"Departure Galerie-Zimmer", dep3:"Departure Einzelzimmer", res:"Restant-Zimmer"},
 en: {dep0:"Departure room", dep1:"Departure double room", dep2:"Departure gallery room", dep3:"Departure single room", res:"Stayover room"},
 pl: {dep0:"Pokój departure", dep1:"Departure – pokój 2-os.", dep2:"Departure – z antresolą", dep3:"Departure – pokój 1-os.", res:"Pokój restant"}};
const PDFS = {
 prize: {de:"sop/Prize_Affoltern_Reinigungskonzept_SOP_DE.pdf", en:"sop/Prize_Affoltern_Reinigungskonzept_SOP_EN.pdf", pl:"sop/Prize_Affoltern_Reinigungskonzept_SOP_PL.pdf"},
 mulin: {de:"sop/HotelMulin_Brigels_Reinigungskonzept_SOP_DE.pdf", en:"sop/HotelMulin_Brigels_Reinigungskonzept_SOP_EN.pdf", pl:"sop/HotelMulin_Brigels_Reinigungskonzept_SOP_PL.pdf"},
 living: {de:"sop/AmanthosLiving_Glattbrugg_Reinigungskonzept_DE.pdf", en:"sop/AmanthosLiving_Glattbrugg_Reinigungskonzept_EN.pdf", pl:"sop/AmanthosLiving_Glattbrugg_Reinigungskonzept_PL.pdf"}};

let lang="de", loc=null, pos=null, opened=new Set();
function t(){return T[lang]}
function setLang(l){lang=l;document.querySelectorAll(".langs button").forEach(b=>b.classList.remove("on"));document.getElementById("l-"+l).classList.add("on");renderStatic();if(document.getElementById("s3").classList.contains("on"))renderSop();}
function renderStatic(){
 document.querySelectorAll("[data-i]").forEach(el=>{const k=el.getAttribute("data-i");if(t()[k])el.innerHTML=t()[k];});
 const vc=document.getElementById("valuecards");vc.innerHTML="";
 t().values.forEach((v,i)=>{const d=document.createElement("div");d.className="vcard"+(opened.has(i)?" open":"");
  d.innerHTML=`<div style="font-size:26px;margin-bottom:6px">${v[0]}</div><h3>${v[1]}</h3><p>${v[2]}</p><div class="more">▾</div>`;
  d.onclick=()=>{opened.add(i);d.classList.add("open");};vc.appendChild(d);});
 const lg=document.getElementById("locgrid");lg.innerHTML="";
 t().locations.forEach((l,i)=>{const d=document.createElement("div");d.className="sel"+(loc===LOCS[i]?" on":"");
  d.innerHTML=`<div class="ico">${l[0]}</div><h3>${l[1]}</h3><p>${l[2]}</p>`;
  d.onclick=()=>{loc=LOCS[i];renderStatic();check2();};lg.appendChild(d);});
 const pg=document.getElementById("posgrid");pg.innerHTML="";
 t().positions.forEach((p,i)=>{const key=i===0?"hk":"rez";const d=document.createElement("div");d.className="sel"+(pos===key?" on":"");
  d.innerHTML=`<div class="ico">${p[0]}</div><h3>${p[1]}</h3><p>${p[2]}</p>`;
  d.onclick=()=>{pos=key;renderStatic();check2();};pg.appendChild(d);});
}
function check2(){document.getElementById("next2").disabled=!(loc&&pos);}
function go(n){document.querySelectorAll(".step").forEach(s=>s.classList.remove("on"));document.getElementById("s"+n).classList.add("on");
 for(let i=1;i<=4;i++)document.getElementById("p"+i).classList.toggle("done",i<=Math.min(n,4));window.scrollTo({top:0,behavior:"smooth"});}
function locName(){return t().locations[LOCS.indexOf(loc)][1]+" – "+t().locations[LOCS.indexOf(loc)][2];}
function posName(){return t().positions[pos==="hk"?0:1][1];}
function renderSop(){
 document.getElementById("sopIntro").innerHTML=pos==="hk"?t().sopIntroHk:t().sopIntroRez;
 let h=`<div class="sopbox"><h2 style="margin-top:0">${locName()} · ${posName()}</h2>`;
 if(pos==="hk"){
   h+=`<h3 style="margin:10px 0 4px">${t().timesTitle}</h3>`;
   if(SOPTIMES[loc]){h+=`<div class="times">`+SOPTIMES[loc].map(x=>`<div class="time ${x[2]}"><b>${x[0]}'</b><span>${TIMELBL[lang][x[1]]}</span></div>`).join("")+`</div>`;}
   else h+=`<p class="hint">${t().noTimes}</p>`;
   h+=`<ul class="rules">`+t().hkRules.map(r=>`<li>${r}</li>`).join("")+`</ul>`;
   h+=`<div class="pdfs" style="margin-top:14px"><b style="font-size:13.5px">${t().pdfTitle}</b><br><a href="${PDFS[loc].de}" target="_blank">🇩🇪 Deutsch</a><a href="${PDFS[loc].en}" target="_blank">🇬🇧 English</a><a href="${PDFS[loc].pl}" target="_blank">🇵🇱 Polski</a></div>`;
 } else {
   h+=`<div class="videobox"><h3>${t().videoTitle}</h3><p>${t().videoText}</p><a class="btn" style="font-size:15px;padding:12px 22px" href="${VIDEOS}" target="_blank">${t().videoBtn} ↗</a></div>`;
   h+=`<ul class="rules">`+t().rezRules.map(r=>`<li>${r}</li>`).join("")+`</ul>`;
 }
 h+=`</div>`;
 document.getElementById("sopContent").innerHTML=h;
}
function checkCommit(){const ok=document.getElementById("name").value.trim().length>2&&document.getElementById("agree1").checked&&document.getElementById("agree2").checked;
 document.getElementById("commitBtn").disabled=!ok;}
function finish(){const n=document.getElementById("name").value.trim();
 document.getElementById("summary").innerHTML=`<b>${t().sumName}:</b> ${n}<br><b>${t().sumLoc}:</b> ${locName()}<br><b>${t().sumPos}:</b> ${posName()}<br><b>${t().sumDate}:</b> ${new Date().toLocaleDateString()}`;
 const body=encodeURIComponent(t().mailBody(n,locName(),posName()));
 document.getElementById("mailBtn").href=`mailto:kaito.weingart@amanthos.com?subject=${encodeURIComponent(t().mailSubj+" – "+n)}&body=${body}`;
 document.querySelectorAll(".step").forEach(s=>s.classList.remove("on"));document.getElementById("s5").classList.add("on");
 for(let i=1;i<=4;i++)document.getElementById("p"+i).classList.add("done");window.scrollTo({top:0});}
function chooseLang(l){setLang(l);go(1);}
renderStatic();
</script>
</body>
</html>
